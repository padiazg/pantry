
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PANTRY_SERVER_PORT=8080
      - PANTRY_LOGLEVEL=info
    restart: unless-stopped

